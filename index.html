<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wuys Macro — Chọn Ngôn Ngữ / Select Language</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Language selection page specific styles */
        .lang-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .lang-card-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
        }

        .lang-option {
            background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 240px;
            position: relative;
            overflow: hidden;
        }

        .lang-option:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 229, 255, 0.2);
        }

        .lang-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent, #00e5ff), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lang-option:hover::before {
            opacity: 1;
        }

        .lang-flag {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .lang-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .lang-code {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent, #00e5ff);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .lang-footer-note {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted, #5a6675);
            letter-spacing: 2px;
        }

        /* Hero visual inherited from main style */
        .lang-hero-visual {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .lang-option {
                padding: 2rem 2rem;
                min-width: 200px;
            }
            .lang-name {
                font-size: 1.5rem;
            }
            .lang-flag {
                font-size: 3rem;
            }
            .lang-hero-visual {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>

<!-- Video background -->
<video autoplay muted loop id="video-background" playsinline>
    <source src="background.mp4" type="video/mp4">
</video>

<!-- Noise overlay -->
<div class="noise-overlay"></div>
<div class="scanlines"></div>

<!-- Boot screen -->
<div class="boot-screen" id="boot-screen">
    <div class="boot-content">
        <div class="boot-logo">
            <span class="boot-w">W</span><span class="boot-rest">UYS</span>
        </div>
        <div class="boot-bar-wrap">
            <div class="boot-bar" id="boot-bar"></div>
        </div>
        <div class="boot-status" id="boot-status">INITIALIZING SYSTEM...</div>
        <div class="boot-hint">[ TAP TO ENTER ]</div>
    </div>
</div>

<!-- Language Selection Page -->
<div class="lang-page">
    
    <!-- Hero Visual (giống trang chính) -->
    <div class="lang-hero-visual">
        <div class="hv-ring ring1"></div>
        <div class="hv-ring ring2"></div>
        <div class="hv-ring ring3"></div>
        <div class="hv-core">
            <span class="core-text">W</span>
        </div>
    </div>

    <!-- Title -->
    <div class="hero-eyebrow">
        <span class="eyebrow-dot"></span>
        VERSION 2.0 — TOE METHOD
        <span class="eyebrow-dot"></span>
    </div>
    
    <h1 style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem;">
        <span style="color: #00e5ff; text-shadow: 0 0 20px #00e5ff;">W</span>UYS<span style="color: #00e5ff;">.</span>
    </h1>
    
    <p style="font-family: 'Share Tech Mono', monospace; color: #a0aab5; text-align: center; margin-bottom: 2rem; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem;">
        Choose your language / Chọn ngôn ngữ
    </p>

    <!-- Language Cards -->
    <div class="lang-card-container">
        <!-- Tiếng Việt -->
        <div class="lang-option" onclick="selectLanguage('vi')">
            <div class="lang-flag">🇻🇳</div>
            <div class="lang-name">Tiếng Việt</div>
            <div class="lang-code">[ VI ]</div>
        </div>
        
        <!-- English -->
        <div class="lang-option" onclick="selectLanguage('en')">
            <div class="lang-flag">🇺🇸</div>
            <div class="lang-name">English</div>
            <div class="lang-code">[ EN ]</div>
        </div>
    </div>

    <!-- Footer note -->
    <div class="lang-footer-note">
        <span>WUYS MACRO — PRECISION CLICK ENGINE</span>
    </div>
</div>

<script>
    // ========== BOOT SEQUENCE ==========
    (function() {
        const bootScreen = document.getElementById('boot-screen');
        const bootBar = document.getElementById('boot-bar');
        const bootStatus = document.getElementById('boot-status');
        const bootHint = document.querySelector('.boot-hint');
        
        const statusMessages = [
            'INITIALIZING SYSTEM...',
            'LOADING MODULES...',
            'CALIBRATING CLICK ENGINE...',
            'TOE METHOD v2.0 ACTIVE',
            'READY'
        ];
        
        let progress = 0;
        let step = 0;
        
        const bootInterval = setInterval(() => {
            progress += 2;
            bootBar.style.width = progress + '%';
            
            if (progress >= 20 && step === 0) {
                step = 1;
                bootStatus.textContent = statusMessages[1];
            } else if (progress >= 45 && step === 1) {
                step = 2;
                bootStatus.textContent = statusMessages[2];
            } else if (progress >= 70 && step === 2) {
                step = 3;
                bootStatus.textContent = statusMessages[3];
            } else if (progress >= 90 && step === 3) {
                step = 4;
                bootStatus.textContent = statusMessages[4];
            }
            
            if (progress >= 100) {
                clearInterval(bootInterval);
                bootStatus.textContent = statusMessages[4];
                bootHint.style.opacity = '1';
                bootHint.style.animation = 'blink-hint 1.5s step-end infinite';
                
                bootScreen.style.pointerEvents = 'auto';
                bootScreen.addEventListener('click', dismissBoot);
                document.addEventListener('keydown', function(e) {
                    if (e.code === 'Space' || e.code === 'Enter') {
                        dismissBoot();
                    }
                });
            }
        }, 30);
        
        function dismissBoot() {
            bootScreen.classList.add('fade-out');
            setTimeout(() => {
                bootScreen.classList.add('hidden');
            }, 600);
            
            bootScreen.removeEventListener('click', dismissBoot);
            bootScreen.style.pointerEvents = 'none';
        }
    })();

    // ========== LANGUAGE SELECTION ==========
    function selectLanguage(lang) {
        localStorage.setItem('wuys_preferred_lang', lang);
        
        if (lang === 'vi') {
            window.location.href = 'index_vi.html';
        } else {
            window.location.href = 'index_en.html';
        }
    }

    // ========== KEYBOARD SHORTCUTS ==========
    document.addEventListener('keydown', function(e) {
        if (e.code === 'KeyV') {
            selectLanguage('vi');
        }
        if (e.code === 'KeyE') {
            selectLanguage('en');
        }
    });

    // Add blink animation if not already defined
    if (!document.querySelector('#blink-style')) {
        const style = document.createElement('style');
        style.id = 'blink-style';
        style.textContent = `
            @keyframes blink-hint {
                0%, 100% { opacity: 0; }
                50% { opacity: 1; }
            }
            .boot-screen.fade-out {
                opacity: 0;
                transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
            .boot-screen.hidden {
                display: none;
            }
        `;
        document.head.appendChild(style);
    }
</script>

</body>
</html>
